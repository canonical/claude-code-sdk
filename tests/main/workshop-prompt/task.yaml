summary: setup-project hook installs the workshop prompt for Claude

prepare: |
  envsubst '${BASE}' <workshop.yaml.in >workshop.yaml
  workshop launch

restore: |
  workshop remove || true

execute: |
  # setup-project installs the workshop prompt as ~/.claude/CLAUDE.md, which
  # Claude Code reads natively as global user memory on every invocation.
  workshop exec -- test -f /home/workshop/.claude/CLAUDE.md
  workshop exec -- head -1 /home/workshop/.claude/CLAUDE.md | \
    MATCH "Workshop Container Environment Instructions"

debug: |
  workshop exec -- ls -la /home/workshop/.claude/ || true
  workshop exec -- cat /home/workshop/.claude/CLAUDE.md || true
