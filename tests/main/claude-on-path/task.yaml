summary: claude is on $PATH inside the workshop

prepare: |
  envsubst '${BASE}' <workshop.yaml.in >workshop.yaml
  workshop launch

restore: |
  workshop remove || true

execute: |
  # `workshop exec` runs as the `workshop` user with a login shell,
  # which is what setup-base configures via /etc/profile.d/claude-code.sh.
  workshop exec -- bash -lc 'command -v claude' | MATCH "^claude$"

debug: |
  workshop exec -- bash -lc 'echo PATH=$PATH' || true
  workshop exec -- bash -lc 'ls -l /etc/profile.d/claude-code.sh' || true
