name: claude-code
title: Claude Code SDK
adopt-info: claude-code
summary: Claude Code CLI
description: |
  This SDK provides the Claude Code CLI for AI-assisted coding within a
  workshop. The agent is sandboxed in the workshop container. Credentials are
  persisted between workshop updates.
license: https://www.anthropic.com/legal/commercial-terms
build-base: ubuntu@26.04
platforms:
  amd64:
    build-on: [amd64, arm64]
    build-for: [amd64]
  arm64:
    build-on: [amd64, arm64]
    build-for: [arm64]

plugs:
  claude-config:
    interface: mount
    workshop-target: /home/workshop/.claude

parts:
  claude-code:
    plugin: nil
    build-packages:
      - curl
      - ca-certificates
      - jq
    override-pull: |
      VERSION="$(cat "$CRAFT_PROJECT_DIR/VERSION")"
      craftctl set version="$VERSION"
      DOWNLOAD_BASE_URL="https://downloads.claude.ai/claude-code-releases"

      case "$CRAFT_ARCH_BUILD_FOR" in
        amd64) PLATFORM="linux-x64" ;;
        arm64) PLATFORM="linux-arm64" ;;
        *) echo "Unsupported architecture: $CRAFT_ARCH_BUILD_FOR" >&2; exit 1 ;;
      esac

      echo "Fetching manifest for version ${VERSION}, platform ${PLATFORM}..."
      MANIFEST="$(curl -fsSL "${DOWNLOAD_BASE_URL}/${VERSION}/manifest.json")"

      CHECKSUM="$(echo "$MANIFEST" | jq -r ".platforms[\"${PLATFORM}\"].checksum")"

      if ! echo "$CHECKSUM" | grep -qE '^[a-f0-9]{64}$'; then
        echo "Invalid or missing checksum for platform ${PLATFORM}" >&2
        exit 1
      fi

      echo "Downloading ${DOWNLOAD_BASE_URL}/${VERSION}/${PLATFORM}/claude..."
      curl -fsSL -o "$CRAFT_PART_SRC/claude" "${DOWNLOAD_BASE_URL}/${VERSION}/${PLATFORM}/claude"

      ACTUAL="$(sha256sum "$CRAFT_PART_SRC/claude" | cut -d' ' -f1)"
      if [ "$ACTUAL" != "$CHECKSUM" ]; then
        echo "Checksum mismatch!" >&2
        echo "  expected: $CHECKSUM" >&2
        echo "  actual:   $ACTUAL" >&2
        rm -f "$CRAFT_PART_SRC/claude"
        exit 1
      fi

      chmod 755 $CRAFT_PART_SRC/claude

      echo "Checksum OK."
    override-build: |
      install -Dm755 "$CRAFT_PART_SRC/claude" "$CRAFT_PRIME/bin/claude"

  workshop-prompt:
    plugin: dump
    source: workshop-prompt.md
    source-type: file
